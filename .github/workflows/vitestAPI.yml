name: Vitest API Test
on:
  push:
    branches: [ ramaLomas ]
  pull_request:
    branches: [ ramaLomas ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Install Newman
        run: npm install -g newman newman-reporter-html
      - name: Start Server
        run: node server/server.js &
      - name: Wait for Server to Start
        run: sleep 3
      - name: Run Postman Collection Tests
        run: newman run "Pruebas de humo zuztand.json" --reporters cli,html --reporter-html-outfile "reports/index.html"
      - name: Debug - List Generated Files
        if: always()
        run: find . -name "index.html" -o -name "*.html" | head -20 && ls -la reports/ 2>/dev/null || echo "reports folder not found"
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: reports/
