name: Vitest API Test
on:
  push:
    branches: [ ramaLomas ]
  pull_request:
    branches: [ ramaLomas ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Install Newman
        run: npm install -g newman newman-reporter-html
      - name: Start Server
        run: node server/server.js &
      - name: Wait for Server to Start
        run: sleep 3
      - name: Create Reports Directory
        run: mkdir -p reports
      - name: Run Postman Collection Tests
        run: newman run "Pruebas de humo zuztand.json" --reporters cli,html
      - name: Copy Report to Reports Folder
        if: always()
        run: cp ./newman/newman-run-report-*.html ./reports/index.html || echo "Could not find newman report"
      - name: Debug - List Generated Files
        if: always()
        run: ls -la reports/
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: reports/index.html
