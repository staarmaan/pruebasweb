name: Vitest Unit Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Run Tests
        run: npm test -- --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
         name: coverage-report
         path: coverage/
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
            node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Instalar Newman
        run: npm install -g newman

      - name: Levantar servidor
        run: node server/server.js & sleep 5

      - name: Ejecutar pruebas de humo
        run: newman run tests-api/pruebas_humo_marco.json -r cli,json --reporter-json-export report.json

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: report.json
  e2e-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Instalar Playwright
        run: npx playwright install --with-deps

      - name: Levantar frontend (Vite)
        run: npm run dev & sleep 10

      - name: Ejecutar tests E2E
        run: npm run testUI

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: playwright-report/