name: Vitest Unit Tests
on:
  push:
    branches: [ ramaArellano ]
  pull_request:
    branches: [ ramaArellano ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Run Tests
        run: npm test 